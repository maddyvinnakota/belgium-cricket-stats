<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cricket Belgium — Stats & Standings</title>
  <script src="/chart.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}

    /* Layout */
    header{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;gap:12px;
           position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .flag{display:flex;gap:2px;height:28px;border-radius:3px;overflow:hidden}
    .flag div{width:12px}
    .logo-title{color:#fff;font-size:16px;font-weight:800;line-height:1.1}
    .logo-sub{color:#94a3b8;font-size:11px}
    main{max-width:1100px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}

    /* Cards */
    .card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e5e7eb;padding:16px}
    .card-bare{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e5e7eb;overflow:hidden}

    /* Series selector */
    .series-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:16px}
    label.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;display:block;margin-bottom:6px}
    select{border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;
           min-width:260px;cursor:pointer;outline:none}
    select:focus{border-color:#CE1126;box-shadow:0 0 0 2px rgba(206,17,38,.15)}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
    .pill-on{background:#dcfce7;color:#15803d}
    .pill-up{background:#e0f2fe;color:#0369a1}
    .pill-done{background:#f3f4f6;color:#6b7280}

    /* Tabs */
    .tabs{display:flex;gap:0;border-bottom:2px solid #e5e7eb}
    .tab{background:none;border:none;cursor:pointer;padding:10px 18px;font-size:13px;font-weight:500;
         color:#6b7280;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
    .tab:hover{color:#374151}
    .tab.active{color:#CE1126;border-bottom-color:#CE1126;font-weight:700}

    /* Tables */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead tr{background:#f8fafc;border-bottom:2px solid #e5e7eb}
    th{padding:10px 12px;text-align:center;font-weight:600;color:#6b7280;white-space:nowrap;font-size:12px}
    th.left,td.left{text-align:left}
    td{padding:10px 12px;text-align:center;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    tbody tr:hover{background:#f8faff}
    tbody tr:last-child td{border-bottom:none}

    /* Sticky rank+team */
    th.sticky,td.sticky{position:sticky;left:0;background:#fff;z-index:2}
    thead th.sticky{background:#f8fafc;z-index:3}

    /* NRR */
    .pos{color:#16a34a;font-weight:600}
    .neg{color:#dc2626;font-weight:600}

    /* Form badges */
    .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;
           font-size:11px;font-weight:800;min-width:20px;height:18px;padding:0 3px;margin:0 1px}
    .bW{background:#22c55e;color:#fff}
    .bL{background:#ef4444;color:#fff}
    .bT{background:#f59e0b;color:#fff}
    .bN{background:#94a3b8;color:#fff}

    /* Team logo */
    .tm-logo{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .tm-init{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
             font-size:9px;font-weight:900;color:#fff;flex-shrink:0;
             background:linear-gradient(135deg,#CE1126,#8b0000)}
    .team-cell{display:flex;align-items:center;gap:8px;white-space:nowrap}
    .team-name{font-weight:600;color:#111}
    .team-code{font-size:10px;color:#9ca3af}

    /* Points summary cells */
    .cW{background:#dcfce7;color:#166534;font-weight:700}
    .cL{background:#fee2e2;color:#991b1b;font-weight:700}
    .cT{background:#fef9c3;color:#713f12;font-weight:700}
    .cNR{background:#f3f4f6;color:#6b7280;font-weight:700}
    .cF{background:#f8fafc;color:#cbd5e1;font-size:11px}
    .cell-pts{font-weight:700;line-height:1.2;font-size:12px}
    .cell-cum{font-size:11px;font-weight:600;opacity:.85;line-height:1.2}
    .cell-opp{font-size:9px;opacity:.6;font-weight:600;letter-spacing:.04em;margin-top:1px}

    /* Chart container */
    .chart-box{position:relative;height:340px;padding:0 4px}

    /* Schedule */
    .match-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #f1f5f9}
    .match-row:last-child{border-bottom:none}
    .match-date{font-size:11px;color:#9ca3af;width:72px;flex-shrink:0}
    .match-teams{flex:1;font-weight:600;color:#374151;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .vs{font-size:11px;color:#9ca3af}
    .match-result{font-size:11px;color:#6b7280;text-align:right;max-width:160px;line-height:1.3}

    /* Spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{display:flex;justify-content:center;align-items:center;padding:48px;gap:12px;color:#9ca3af;font-size:13px}
    .spin{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#CE1126;border-radius:50%;animation:spin .7s linear infinite}

    /* Error */
    .err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:16px;color:#dc2626;font-size:13px}

    /* Legend */
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
    .legend-btn{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;
                border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:12px;font-weight:500;
                color:#374151;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:all .15s}
    .legend-btn:hover{box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .legend-btn.hidden{opacity:.3;background:#f3f4f6}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .legend-reset{background:none;border:none;color:#3b82f6;font-size:12px;cursor:pointer;padding:4px 8px;font-weight:600}
    .legend-reset:hover{text-decoration:underline}

    /* Info bar */
    .info-bar{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;
              display:flex;align-items:center;gap:12px;margin-top:8px}
    .info-link{margin-left:auto;background:#2563eb;color:#fff;padding:6px 14px;border-radius:8px;
               text-decoration:none;font-size:12px;font-weight:700;white-space:nowrap}
    .info-link:hover{background:#1d4ed8}

    /* Page title */
    h2{font-size:22px;font-weight:800;color:#111}
    h2 small{font-size:13px;font-weight:400;color:#9ca3af;margin-left:8px}
    h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin-bottom:8px}

    /* Tooltip */
    [data-tip]{position:relative;cursor:default}
    [data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:120%;left:50%;transform:translateX(-50%);
      background:#1e293b;color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:99;pointer-events:none}

    /* Graph controls */
    .graph-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .graph-note{font-size:11px;color:#94a3b8}
  </style>
</head>
<body>

<header>
  <div class="flag">
    <div style="background:#1a1a1a"></div>
    <div style="background:#F0B429"></div>
    <div style="background:#CE1126"></div>
  </div>
  <div>
    <div class="logo-title">Cricket Belgium</div>
    <div class="logo-sub">Stats &amp; Standings</div>
  </div>
  <div style="margin-left:auto;font-size:11px;color:#475569">cricclubs.com/CricketBelgium</div>
</header>

<main>
  <!-- Series selector -->
  <div class="card" id="series-card">
    <div class="series-row">
      <div>
        <label class="lbl">Series / Tournament</label>
        <select id="series-select" onchange="onSeriesChange()">
          <option>Loading…</option>
        </select>
      </div>
      <div id="div-row" style="display:none">
        <label class="lbl">Division</label>
        <select id="div-select" onchange="onDivisionChange()">
        </select>
      </div>
      <div id="series-meta" style="display:flex;align-items:center;gap:8px;padding-bottom:2px"></div>
    </div>
  </div>

  <!-- Page title -->
  <div>
    <h2 id="page-title">Belgium Cricket <small id="page-sub">Select a series above</small></h2>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('table')">Points Table</button>
    <button class="tab" onclick="switchTab('summary')">Points Summary</button>
    <button class="tab" onclick="switchTab('graph')">Points Graph</button>
    <button class="tab" onclick="switchTab('schedule')">Schedule</button>
  </div>

  <!-- Content panels -->
  <div id="panel-table"></div>
  <div id="panel-summary" style="display:none"></div>
  <div id="panel-graph" style="display:none"></div>
  <div id="panel-schedule" style="display:none"></div>

  <footer style="text-align:center;font-size:11px;color:#9ca3af;padding:20px 0">
    Data from <a href="https://cricclubs.com/CricketBelgium" target="_blank" style="color:#3b82f6">cricclubs.com/CricketBelgium</a>
    · Built for Cricket Belgium 🏏🇧🇪
  </footer>
</main>

<script>
// ── Globals ──────────────────────────────────────────────────────
const TEAM_COLORS = [
  '#CE1126','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6',
  '#8b5cf6','#ec4899','#06b6d4','#84cc16','#f43f5e','#a855f7',
  '#10b981','#6366f1','#fb923c','#0ea5e9','#ff6384','#36a2eb',
];

// ── Seeded PRNG (LCG) — deterministic per team so Summary & Graph agree ──
function seededRand(seed) {
  let s = (seed | 0) || 1;
  return () => { s = Math.imul(s, 1664525) + 1013904223 | 0; return (s >>> 0) / 4294967296; };
}
function strSeed(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return Math.abs(h);
}

// ── Round-robin schedule (Berger circle method) ───────────────────
// Returns opp[i] = ordered list of opponent team indices for team i
function roundRobinSchedule(n) {
  const opp = Array.from({length: n}, () => []);
  const isOdd = n % 2 !== 0;
  const t = isOdd ? [...Array(n).keys(), -1] : [...Array(n).keys()];
  const m = t.length; // always even
  for (let round = 0; round < m - 1; round++) {
    for (let j = 0; j < m / 2; j++) {
      const a = t[j], b = t[m - 1 - j];
      if (a >= 0 && b >= 0) { opp[a].push(b); opp[b].push(a); }
    }
    // Rotate: keep t[m-1] fixed, shift t[0..m-2]
    const first = t[0];
    for (let k = 0; k < m - 2; k++) t[k] = t[k + 1];
    t[m - 2] = first;
  }
  return opp;
}

// Short (≤3 char) code for a team
function teamAbbr(t) {
  if (t.code && t.code.trim()) return t.code.trim().slice(0, 3);
  const words = (t.team || '').split(/\s+/).filter(w => w.length > 1);
  return words.map(w => w[0]).join('').slice(0, 3).toUpperCase() || '?';
}

// Simulate cumulative points per match for a team (deterministic)
function simulateCumulative(t) {
  const rand = seededRand(strSeed(t.team));
  const pts = [0]; let wR = t.w, lR = t.l;
  const ppw = t.w > 0 ? t.pts / t.w : 2;
  for (let i = 0; i < t.m; i++) {
    const last = pts[pts.length - 1];
    if (wR > 0 && (rand() < wR / Math.max(t.m - i, 1) || lR === 0)) {
      pts.push(last + ppw); wR--;
    } else if (lR > 0) { pts.push(last); lR--; }
    else { pts.push(last + ppw); wR--; }
  }
  const fin = pts[pts.length - 1];
  return fin > 0 ? pts.map(p => Math.round(p * t.pts / fin)) : pts;
}

let allSeries = [];
let currentSeriesId = null;
let currentTab = 'table';
let pointsTableCache = {}; // seriesId -> groups
let chartInstance = null;

// ── Fetch helper with localStorage cache (stale-while-revalidate) ─
const LC_PREFIX = 'bcs_';
const LC_TTL = {
  series:       24 * 60 * 60 * 1000,
  'points-table': 30 * 60 * 1000,
  matches:       30 * 60 * 1000,
  schedule:      30 * 60 * 1000,
  'team-matches': 30 * 60 * 1000,
  'player-stats': 30 * 60 * 1000,
};
function lcKey(path)  { return LC_PREFIX + path; }
function lcTtl(path)  {
  const seg = path.replace(/^\/api\//, '').split('?')[0];
  return LC_TTL[seg] ?? 30 * 60 * 1000;
}
function lcGet(path) {
  try {
    const raw = localStorage.getItem(lcKey(path));
    if (!raw) return null;
    const { d, ts } = JSON.parse(raw);
    return Date.now() - ts < lcTtl(path) ? d : null;
  } catch { return null; }
}
function lcSet(path, d) {
  try { localStorage.setItem(lcKey(path), JSON.stringify({ d, ts: Date.now() })); } catch {}
}

async function api(path, { revalidate = true } = {}) {
  const cached = lcGet(path);
  if (cached) {
    // Return stale data immediately; refresh in background
    if (revalidate) fetch(path).then(r => r.ok ? r.json() : null).then(d => d && lcSet(path, d)).catch(() => {});
    return cached;
  }
  const r = await fetch(path);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  lcSet(path, d);
  return d;
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  setPanel('table', spinner());
  try {
    allSeries = await api('/api/series');
  } catch(e) {
    setPanel('table', err('Could not load series: ' + e.message));
    return;
  }

  // Sort: ONGOING first (use ?? not || so that value 0 isn't treated as falsy)
  const order = {ONGOING:0, UPCOMING:1, COMPLETED:2};
  allSeries.sort((a,b) => (order[a.status]??3) - (order[b.status]??3));

  // Populate select
  const sel = document.getElementById('series-select');
  sel.innerHTML = allSeries.map((s,i) =>
    `<option value="${i}">${s.name} (${s.year}) ${s.status==='ONGOING'?'●':s.status==='UPCOMING'?'◆':'✓'}</option>`
  ).join('');

  // Default: T20 CUP ONGOING, else first ONGOING
  let defIdx = allSeries.findIndex(s => s.status === 'ONGOING' && /t20.cup/i.test(s.name));
  if (defIdx < 0) defIdx = allSeries.findIndex(s => s.status === 'ONGOING');
  sel.value = defIdx >= 0 ? defIdx : 0;
  await onSeriesChange();
}

async function onSeriesChange() {
  const idx = parseInt(document.getElementById('series-select').value);
  const s   = allSeries[idx];
  if (!s) return;

  // Handle divisions: if series has divisions, show division selector
  const divRow = document.getElementById('div-row');
  const divSel = document.getElementById('div-select');

  if (s.divisions && s.divisions.length > 0) {
    divRow.style.display = '';
    divSel.innerHTML = s.divisions.map((d, i) =>
      `<option value="${i}">${d.name} ${d.status==='ONGOING'?'●':d.status==='UPCOMING'?'◆':'✓'}</option>`
    ).join('');
    // Default to first ONGOING division
    const defDiv = s.divisions.findIndex(d => d.status === 'ONGOING');
    divSel.value = String(defDiv >= 0 ? defDiv : 0);
    currentSeriesId = s.divisions[parseInt(divSel.value)].seriesId;
  } else {
    divRow.style.display = 'none';
    currentSeriesId = s.seriesId;
  }

  // Meta pills
  const pillCls = {ONGOING:'pill-on', UPCOMING:'pill-up', COMPLETED:'pill-done'};
  const pillLbl = {ONGOING:'● Live', UPCOMING:'◆ Upcoming', COMPLETED:'✓ Completed'};
  document.getElementById('series-meta').innerHTML =
    `<span class="pill ${pillCls[s.status]||'pill-done'}">${pillLbl[s.status]||s.status}</span>
     <span style="font-size:11px;color:#9ca3af">${s.type}</span>`;

  // Title
  document.getElementById('page-title').innerHTML =
    `${s.name} <small>Cricket Belgium · ${s.year}</small>`;

  await loadTab(currentTab);
}

function onDivisionChange() {
  const idx    = parseInt(document.getElementById('series-select').value);
  const s      = allSeries[idx];
  const divIdx = parseInt(document.getElementById('div-select').value);
  if (!s?.divisions?.[divIdx]) return;
  currentSeriesId = s.divisions[divIdx].seriesId;
  // Invalidate client-side cache for this series
  delete pointsTableCache[currentSeriesId];
  loadTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['table','summary','graph','schedule'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  loadTab(tab);
}

async function loadTab(tab) {
  // Hide all panels, show current
  ['table','summary','graph','schedule'].forEach(p => {
    document.getElementById('panel-'+p).style.display = p === tab ? '' : 'none';
  });
  if (!currentSeriesId) return;

  switch(tab) {
    case 'table':    return loadTable();
    case 'summary':  return loadSummary();
    case 'graph':    return loadGraph();
    case 'schedule': return loadSchedule();
  }
}

// ── Points Table ─────────────────────────────────────────────────
async function loadTable() {
  setPanel('table', spinner());
  try {
    const groups = await getPointsTable(currentSeriesId);
    setPanel('table', renderTable(groups));
  } catch(e) {
    setPanel('table', err(e.message));
  }
}

async function getPointsTable(seriesId) {
  if (pointsTableCache[seriesId]) return pointsTableCache[seriesId];
  const groups = await api('/api/points-table?seriesId=' + encodeURIComponent(seriesId));
  pointsTableCache[seriesId] = groups;
  return groups;
}

function renderTable(groups) {
  if (!groups?.length || !groups[0]?.teams?.length) {
    return '<p style="text-align:center;color:#9ca3af;padding:40px">No standings data yet for this series.</p>';
  }

  return groups.map(g => `
    ${groups.length > 1 ? `<h3 style="margin-bottom:8px">${g.groupName}</h3>` : ''}
    <div class="card-bare tbl-wrap" style="margin-bottom:16px">
      <table>
        <thead>
          <tr>
            <th class="sticky left" style="width:32px">#</th>
            <th class="sticky left" style="min-width:180px">Team</th>
            ${['M','W','L','T','N/R','PTS','NRR','For','Against','Next'].map(h =>
              `<th data-tip="${{M:'Matches',W:'Wins',L:'Losses',T:'Ties','N/R':'No Result',
                PTS:'Points',NRR:'Net Run Rate',For:'Runs/Overs Scored',
                Against:'Runs/Overs Conceded',Next:'Next Match'}[h]||h}">${h}</th>`
            ).join('')}
          </tr>
        </thead>
        <tbody>
          ${g.teams.map((t,i) => {
            const nrr = parseFloat(t.nrr)||0;
            const next = t.matchSchedule?.[0];
            const formW = Array(t.w).fill('<span class="badge bW">W</span>');
            const formL = Array(t.l).fill('<span class="badge bL">L</span>');
            const formT = Array(t.t).fill('<span class="badge bT">T</span>');
            const form  = [...formW,...formL,...formT].slice(-5).join('');
            const color = TEAM_COLORS[i % TEAM_COLORS.length];
            return `<tr>
              <td class="sticky" style="font-weight:700;color:#9ca3af">${t.rank}</td>
              <td class="sticky left">
                <div class="team-cell">
                  ${t.logo
                    ? `<img src="${t.logo}" class="tm-logo" onerror="this.style.display='none';this.nextSibling.style.display='flex'" /><div class="tm-init" style="display:none;background:${color}">${(t.team||'?').slice(0,2).toUpperCase()}</div>`
                    : `<div class="tm-init" style="background:${color}">${(t.team||'?').slice(0,2).toUpperCase()}</div>`
                  }
                  <div>
                    <div class="team-name">${teamLabel(t)}</div>
                  </div>
                </div>
              </td>
              <td>${t.m}</td>
              <td>${t.w}</td>
              <td>${t.l}</td>
              <td>${t.t}</td>
              <td>${t.nr}</td>
              <td style="font-weight:800;font-size:15px">${t.pts}</td>
              <td class="${nrr>=0?'pos':'neg'}">${nrr>=0?'+':''}${nrr.toFixed(3)}</td>
              <td style="font-family:monospace;font-size:12px;color:#6b7280">${t.forDisplay||'-'}</td>
              <td style="font-family:monospace;font-size:12px;color:#6b7280">${t.agstDisplay||'-'}</td>
              <td style="font-size:11px;color:#6b7280">${next ? `vs ${next.vs}` : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `).join('');
}

// ── Points Summary ────────────────────────────────────────────────
// Return the year for the current series (used for team-matches API)
function currentSeriesYear() {
  for (const s of allSeries) {
    if (s.seriesId === currentSeriesId) return s.year;
    for (const d of (s.divisions ?? [])) {
      if (d.seriesId === currentSeriesId) return s.year;
    }
  }
  return new Date().getFullYear();
}

async function loadSummary() {
  setPanel('summary', spinner());
  try {
    const [groups, matchResp] = await Promise.all([
      getPointsTable(currentSeriesId),
      api(`/api/matches?seriesId=${currentSeriesId}`).catch(() => ({ matches: [], rules: {} })),
    ]);
    const allMatches = matchResp.matches ?? (Array.isArray(matchResp) ? matchResp : []);
    const rules = matchResp.rules ?? {};

    // Fetch exact per-match points (incl. bonus) for every team in parallel
    const year = currentSeriesYear();
    const allTeams = groups.flatMap(g => g.teams).filter(t => t.teamId);
    const teamMatchResults = await Promise.all(
      allTeams.map(t =>
        api(`/api/team-matches?seriesId=${currentSeriesId}&teamId=${encodeURIComponent(t.teamId)}&year=${year}`)
          .catch(() => [])
      )
    );
    // Build lookup: teamName -> { fixtureId -> exactPts }
    const exactPtsMap = {};
    allTeams.forEach((t, i) => {
      const byFixture = {};
      (teamMatchResults[i] ?? []).forEach(m => {
        if (m.fixtureId && m.selectedTeamPoints != null) byFixture[m.fixtureId] = m.selectedTeamPoints;
      });
      exactPtsMap[t.team] = byFixture;
    });

    setPanel('summary', renderSummary(groups, allMatches, rules, exactPtsMap));
  } catch(e) {
    setPanel('summary', err(e.message));
  }
}

// Determine W/L/NR/T result for a team in a completed match
function matchResultForTeam(match, teamName) {
  const r = (match.result ?? '').trim();
  if (!r || r.includes('TBD') || r === '') return null; // no score yet
  if (/abandoned/i.test(r))  return 'NR';
  if (/no result/i.test(r))  return 'NR';
  if (/tie|tied/i.test(r))   return 'T';
  // "Team Name won by X" — find the winner by extracting before " won"
  const wonIdx = r.toLowerCase().indexOf(' won');
  if (wonIdx >= 0) {
    const winner = r.slice(0, wonIdx).trim();
    return winner === teamName ? 'W' : 'L';
  }
  return null;
}

// Build per-team match timeline from real fixture list, sorted by date.
// Returns [{opp, oppAbbr, result:'W'|'L'|'NR'|'T'|null, cumPts, date, isCompleted}]
function buildTeamTimeline(teamName, allMatches, ptsPerWin) {
  const myMatches = allMatches.filter(m =>
    m.teamOne.name === teamName || m.teamTwo.name === teamName
  ).sort((a, b) => new Date(a.date) - new Date(b.date));

  let cumPts = 0;
  return myMatches.map(m => {
    const isCompleted = m.status === 'Completed';
    const opp = m.teamOne.name === teamName ? m.teamTwo.name : m.teamOne.name;
    const oppAbbr = oppAbbrFromName(opp, allMatches);
    let result = null;
    if (isCompleted) {
      result = matchResultForTeam(m, teamName);
      if (result === 'W')  cumPts += ptsPerWin;
      else if (result === 'NR' || result === 'T') cumPts += 1;
      // loss: +0
    }
    return { opp, oppAbbr, result, cumPts: isCompleted ? cumPts : null, date: m.date, isCompleted };
  });
}

// Derive a short abbreviation for a team name using all match data (team codes not in match list)
// Falls back to initials
const _abbrCache = {};
function oppAbbrFromName(name, allMatches) {
  if (_abbrCache[name]) return _abbrCache[name];
  // Try to find this team in the points table teams (set via renderSummary scope)
  // Just derive from name words: first letter of each significant word, up to 3 chars
  const words = name.split(/[\s\-]+/).filter(w => w.length > 1 && !/^(cricket|club|cc|bc|cc)$/i.test(w));
  const abbr = words.map(w => w[0]).join('').slice(0, 3).toUpperCase() || name.slice(0,3).toUpperCase();
  _abbrCache[name] = abbr;
  return abbr;
}

function renderSummary(groups, allMatches, rules, exactPtsMap = {}) {
  const legend = `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px">
    ${[['W – Win','cW'],['L – Loss','cL'],['NR – No Result','cNR'],['Upcoming','cF']].map(([l,c])=>
      `<span class="badge ${c}" style="font-size:11px;padding:3px 10px;border-radius:99px;min-width:auto">${l}</span>`
    ).join('')}
  </div>`;

  // Points per outcome from series rules (exact values from CricClubs series details)
  const ptW  = rules.winPoints       ?? 2;
  const ptL  = rules.lossPoints      ?? 0;
  const ptT  = rules.tiePoints       ?? 1;
  const ptNR = rules.abandonedPoints ?? 1;
  // Per-game points label: always show the base pts earned for that result

  return legend + groups.map(g => {
    const teams = g.teams;

    // Build timelines using teamAbbr (has access to t.code)
    const nameToAbbr = {};
    teams.forEach(t => { nameToAbbr[t.team] = teamAbbr(t); });
    const getOppAbbr = name => nameToAbbr[name] || oppAbbrFromName(name, allMatches);

    const timelines = {};
    teams.forEach(t => {
      const myMatches = allMatches.filter(m =>
        m.teamOne.name === t.team || m.teamTwo.name === t.team
      ).sort((a, b) => new Date(a.date) - new Date(b.date));

      const teamExact = exactPtsMap[t.team] ?? {};
      timelines[t.team] = myMatches.map(m => {
        const isCompleted = m.status === 'Completed';
        const opp = m.teamOne.name === t.team ? m.teamTwo.name : m.teamOne.name;
        const result = isCompleted ? matchResultForTeam(m, t.team) : null;
        let gamePts = null;
        if (isCompleted) {
          // Use exact points from CricClubs API (includes bonus) if available
          if (teamExact[m.fixtureId] != null) {
            gamePts = teamExact[m.fixtureId];
          } else {
            if      (result === 'W')  gamePts = ptW;
            else if (result === 'L')  gamePts = ptL;
            else if (result === 'T')  gamePts = ptT;
            else if (result === 'NR') gamePts = ptNR;
          }
        }
        return { opp, oppAbbr: getOppAbbr(opp), result, gamePts, date: m.date, isCompleted };
      });
    });

    const maxCols = Math.max(...Object.values(timelines).map(tl => tl.length), 0);
    if (maxCols === 0) {
      // No match data — fall back to played-count only (no match list available)
      const maxM = Math.max(...teams.map(t=>t.m), 0);
      if (maxM === 0) return `<p style="text-align:center;color:#9ca3af;padding:24px">No matches played yet.</p>`;
      return `<p style="text-align:center;color:#9ca3af;padding:16px;font-size:12px">Match schedule not available for this series.</p>`;
    }

    const cols = Array.from({length: maxCols}, (_, i) => i);
    return `
      ${groups.length>1?`<h3 style="margin-bottom:8px">${g.groupName}</h3>`:''}
      <div class="card-bare tbl-wrap" style="margin-bottom:16px">
        <table>
          <thead><tr>
            <th class="sticky left" style="min-width:150px">Team</th>
            ${cols.map(i=>`<th>M${i+1}</th>`).join('')}
            <th>Pts</th>
          </tr></thead>
          <tbody>
            ${teams.map((t, ti) => {
              const color = TEAM_COLORS[ti%TEAM_COLORS.length];
              const tl = timelines[t.team] ?? [];
              return `<tr>
                <td class="sticky left">
                  <div class="team-cell">
                    ${t.logo?`<img src="${t.logo}" class="tm-logo" onerror="this.style.display='none'">`
                            :`<div class="tm-init" style="background:${color}">${(t.team||'?').slice(0,2).toUpperCase()}</div>`}
                    <span style="font-weight:600;font-size:12px">${teamLabel(t)}</span>
                  </div>
                </td>
                ${cols.map(i => {
                  const slot = tl[i];
                  if (!slot) return `<td class="cF"></td>`;
                  if (!slot.isCompleted) {
                    const dt = slot.date ? new Date(slot.date) : null;
                    const dayStr = dt ? dt.toLocaleDateString('en-GB', {day:'numeric',month:'short'}) : '';
                    return `<td class="cF" title="vs ${slot.opp}${dayStr?' – '+dayStr:''}">
                      <div class="cell-pts" style="font-size:9px;opacity:.55">${dayStr}</div>
                      <div class="cell-opp">${slot.oppAbbr}</div>
                    </td>`;
                  }
                  const cls = slot.result==='W'?'cW':slot.result==='L'?'cL':slot.result==='NR'?'cNR':'cT';
                  const ptsLabel = slot.gamePts != null ? `+${slot.gamePts}` : '';
                  return `<td class="${cls}" title="vs ${slot.opp} – ${slot.result}${slot.gamePts!=null?' (+'+slot.gamePts+' pts)':''}">
                    <div class="cell-pts">${slot.result ?? '?'}</div>
                    ${ptsLabel ? `<div class="cell-cum">${ptsLabel}</div>` : ''}
                    <div class="cell-opp">${slot.oppAbbr}</div>
                  </td>`;
                }).join('')}
                <td style="font-weight:800;background:#f8fafc">${t.pts}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  }).join('');
}

// ── Points Graph ──────────────────────────────────────────────────
async function loadGraph() {
  setPanel('graph', spinner());
  try {
    const groups = await getPointsTable(currentSeriesId);
    setPanel('graph', renderGraphShell(groups));
    buildChart(groups);
  } catch(e) {
    setPanel('graph', err(e.message));
  }
}

function renderGraphShell(groups) {
  const teams = groups?.[0]?.teams ?? [];
  const maxM  = Math.max(...teams.map(t=>t.m), 0);
  if(maxM===0) return `<p style="text-align:center;color:#9ca3af;padding:40px">No matches played yet.</p>`;
  return `
    <div class="card">
      <div class="graph-header">
        <div>
          <h3 style="margin-bottom:2px">Points Progression</h3>
          <div class="graph-note">Cumulative points after each match <span style="color:#9ca3af;font-size:10px">(match order estimated)</span></div>
        </div>
        <button class="legend-reset" onclick="resetGraph()">Reset</button>
      </div>
      <div class="chart-box"><canvas id="pts-chart"></canvas></div>
      <div class="legend" id="chart-legend"></div>
    </div>`;
}

function buildChart(groups) {
  const canvas = document.getElementById('pts-chart');
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const teams = groups?.[0]?.teams ?? [];
  const maxM  = Math.max(...teams.map(t=>t.m), 0);
  if (!maxM) return;

  // Build cumulative data per team (deterministic — seeded by team name)
  const cum = {};
  teams.forEach(t => { cum[t.team] = simulateCumulative(t); });

  const labels = Array.from({length:maxM+1},(_,i)=>i);
  const datasets = teams.map((t,i) => ({
    label: teamLabel(t),
    data:  cum[t.team] ?? [0],
    borderColor: TEAM_COLORS[i%TEAM_COLORS.length],
    backgroundColor: TEAM_COLORS[i%TEAM_COLORS.length],
    borderWidth: 2.5,
    pointRadius: 3.5,
    pointHoverRadius: 6,
    tension: 0,
  }));

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#1e293b',
          padding:10,
          callbacks: {
            title: ctx => `After match ${ctx[0].label}`,
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts`,
          }
        }
      },
      scales: {
        x: { title:{display:true,text:'Matches played',color:'#94a3b8',font:{size:11}},
             grid:{color:'#f1f5f9'}, ticks:{color:'#94a3b8',font:{size:11}} },
        y: { title:{display:true,text:'Points',color:'#94a3b8',font:{size:11}},
             grid:{color:'#f1f5f9'}, ticks:{color:'#94a3b8',font:{size:11}}, beginAtZero:true }
      }
    }
  });

  // Build custom legend
  const legendEl = document.getElementById('chart-legend');
  if (legendEl) {
    legendEl.innerHTML = teams.map((t,i) =>
      `<button class="legend-btn" id="lb-${i}" onclick="toggleLine(${i})">
        <span class="legend-dot" style="background:${TEAM_COLORS[i%TEAM_COLORS.length]}"></span>
        ${teamLabel(t)}
      </button>`
    ).join('');
  }
}

function toggleLine(idx) {
  if (!chartInstance) return;
  const meta = chartInstance.getDatasetMeta(idx);
  meta.hidden = !meta.hidden;
  chartInstance.update();
  document.getElementById('lb-'+idx)?.classList.toggle('hidden', meta.hidden);
}

function resetGraph() {
  if (!chartInstance) return;
  chartInstance.data.datasets.forEach((_,i) => {
    chartInstance.getDatasetMeta(i).hidden = false;
  });
  chartInstance.update();
  document.querySelectorAll('.legend-btn').forEach(b => b.classList.remove('hidden'));
}

// ── Schedule ──────────────────────────────────────────────────────
async function loadSchedule() {
  setPanel('schedule', spinner());
  try {
    // Fetch schedule first (server derives it from the points table internally)
    // Then get points table from cache (same server-side key, no extra navigation)
    const schedule = await api('/api/schedule?seriesId=' + encodeURIComponent(currentSeriesId));
    const groups   = await getPointsTable(currentSeriesId); // uses client-side cache
    setPanel('schedule', renderSchedule(schedule, groups));
  } catch(e) {
    setPanel('schedule', err(e.message));
  }
}

function renderSchedule(schedule, groups) {
  const teams = groups?.flatMap(g => g.teams ?? []) ?? [];
  const upcoming = (schedule??[]).filter(m => m.date);

  let html = '';

  if (upcoming.length > 0) {
    html += `<h3 style="margin-bottom:8px">Upcoming Fixtures</h3>
      <div class="card-bare" style="margin-bottom:16px">
        ${upcoming.map(m => `
          <div class="match-row">
            <div class="match-date">${m.date ? new Date(m.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '—'}</div>
            <div class="match-teams">
              <span>${m.team}</span>
              <span class="vs">vs</span>
              <span>${m.opponent}</span>
            </div>
            ${m.ground ? `<div style="font-size:11px;color:#9ca3af">${m.ground}</div>` : ''}
          </div>`).join('')}
      </div>`;
  }

  if (teams.length > 0) {
    html += `<h3 style="margin-bottom:8px">Results Summary</h3>
      <div class="card-bare" style="margin-bottom:16px">
        ${teams.map((t,i) => {
          const color = TEAM_COLORS[i%TEAM_COLORS.length];
          const badges = [
            ...Array(t.w).fill('<span class="badge bW">W</span>'),
            ...Array(t.l).fill('<span class="badge bL">L</span>'),
            ...Array(t.t).fill('<span class="badge bT">T</span>'),
            ...Array(t.nr).fill('<span class="badge bN">N/R</span>'),
          ].join('');
          return `<div class="match-row">
            <div class="team-cell" style="width:200px;flex-shrink:0">
              ${t.logo?`<img src="${t.logo}" class="tm-logo" onerror="this.style.display='none'">`
                      :`<div class="tm-init" style="background:${color}">${(t.team||'?').slice(0,2).toUpperCase()}</div>`}
              <span style="font-weight:600">${teamLabel(t)}</span>
            </div>
            <div style="flex:1;display:flex;gap:3px;flex-wrap:wrap">${badges||'<span style="color:#9ca3af;font-size:12px">No matches yet</span>'}</div>
            <div style="font-size:12px;color:#6b7280;min-width:60px;text-align:right">${t.m>0?`${t.w}W ${t.l}L`:''}</div>
          </div>`;
        }).join('')}
      </div>`;
  }

  html += `<div class="info-bar">
    <span style="font-size:18px">📋</span>
    <div>
      <div style="font-weight:700;color:#1e40af;font-size:13px">Full scorecards & fixtures</div>
      <div style="font-size:11px;color:#3b82f6;margin-top:2px">Detailed match results are on CricClubs</div>
    </div>
    <a href="https://cricclubs.com/CricketBelgium" target="_blank" class="info-link">View on CricClubs →</a>
  </div>`;

  return html;
}

// Returns "ABC Team Full Name" — code prefix if available
function teamLabel(t) {
  return t.code ? `${t.code} ${t.team}` : t.team;
}

// ── Helpers ───────────────────────────────────────────────────────
function setPanel(id, html) {
  document.getElementById('panel-'+id).innerHTML = html;
}
function spinner() {
  return `<div class="spinner"><div class="spin"></div> Loading…</div>`;
}
function err(msg) {
  return `<div class="err"><strong>Error:</strong> ${msg}<br><small>Make sure the server is running: npm start</small></div>`;
}

// ── Boot ─────────────────────────────────────────────────────────
init();
</script>
